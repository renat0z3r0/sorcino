name: Tabby
description: "TabbyML self-hosted code-completion server"
reference: "https://github.com/TabbyML/tabby"
confidence_base: 0

ports:
  - port: 8080
    weight: 5

endpoints:
  - path: "/api-docs/openapi.json"
    method: "GET"
    weight: 10
    response_patterns:
      - pattern: '"title"\s*:\s*"Tabby Server"'
        weight: 50
  - path: "/v1/health"
    method: "GET"
    weight: 10
    response_patterns:
      - pattern: '"cuda_devices"'
        weight: 45

threshold: 45
