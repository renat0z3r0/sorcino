name: AnythingLLM
description: "AnythingLLM (Mintplex-Labs)"
reference: "https://github.com/Mintplex-Labs/anything-llm"
confidence_base: 0

ports:
  - port: 3001
    weight: 15

endpoints:
  - path: "/api/docs"
    method: "GET"
    weight: 10
    response_patterns:
      - pattern: "AnythingLLM Developer API Documentation"
        weight: 50
  - path: "/"
    method: "GET"
    weight: 5
    response_patterns:
      - pattern: 'AnythingLLM \| Your personal LLM'
        weight: 45

threshold: 45
