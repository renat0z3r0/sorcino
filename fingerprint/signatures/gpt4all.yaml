name: GPT4All
description: "GPT4All desktop Local API Server"
reference: "https://github.com/nomic-ai/gpt4all"
confidence_base: 0

ports:
  - port: 4891
    weight: 15

endpoints:
  - path: "/v1/models"
    method: "GET"
    weight: 5
    response_patterns:
      - pattern: '"owned_by"\s*:\s*"humanity"'
        weight: 50

threshold: 45
