name: LM Studio
description: "LM Studio local REST API server"
reference: "https://lmstudio.ai/docs/developer/rest/endpoints"
confidence_base: 0

ports:
  - port: 1234
    weight: 15

endpoints:
  - path: "/api/v0/models"
    method: "GET"
    weight: 10
    response_patterns:
      - pattern: '"compatibility_type"'
        weight: 50
  - path: "/api/v1/models"
    method: "GET"
    weight: 10
    response_patterns:
      - pattern: '"bits_per_weight"'
        weight: 45

threshold: 45
